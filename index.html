<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>PIXOR V2.1</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

:root{
--bg:#02070b;
--panel:#050505;
--border:#00d9ff;
--text:#8ffcff;
--accent:#ff9900;
}

.theme-oled{
--bg:#000;
--panel:#050505;
--border:#00e5ff;
--text:#fff;
--accent:#ff9900;
}

.theme-matte{
--bg:#161a1f;
--panel:#222831;
--border:#00bcd4;
--text:#eafcff;
--accent:#ff9900;
}

.theme-light{
--bg:#f5f7fa;
--panel:#fff;
--border:#0099ff;
--text:#111;
--accent:#ff9900;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:var(--bg);
color:var(--text);
}

body{
padding:10px;
}

.dashboard{
height:100%;
display:flex;
flex-direction:column;
gap:10px;
}

.header{
height:60px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:clamp(24px,4vw,42px);
font-weight:800;
letter-spacing:4px;
}

.controls{
display:flex;
gap:8px;
}

select,
button{
background:var(--panel);
color:var(--text);
border:2px solid var(--border);
border-radius:999px;
padding:10px 14px;
box-shadow:0 0 10px var(--border);
}

#fullscreenBtn{
width:52px;
}

.grid{
flex:1;
display:grid;
gap:10px;
}

/* TELEFON */

@media(max-width:768px){

.grid{
grid-template-columns:1fr 1fr;
grid-template-rows:repeat(3,1fr);
}

}

/* TABLET */

@media(min-width:769px){

.grid{
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(2,1fr);
}

}

/* LANDSCAPE TELEFON */

@media(max-height:500px){

.grid{
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(2,1fr);
}

}

.panel{

background:var(--panel);

border:2px solid var(--border);

border-radius:16px;

padding:12px;

overflow:hidden;

display:flex;
flex-direction:column;

box-shadow:
0 0 15px var(--border),
inset 0 0 15px rgba(0,217,255,.2);

}

.title{
font-size:13px;
opacity:.8;
margin-bottom:8px;
}

.center{
justify-content:center;
align-items:center;
text-align:center;
}

.btcValue{
font-size:clamp(24px,4vw,70px);
font-weight:800;
color:var(--accent);
}

.stock{
font-size:clamp(14px,2vw,32px);
line-height:1.7;
}

.clockValue{
font-size:clamp(26px,5vw,80px);
font-weight:700;
}

.weatherIcon{
font-size:clamp(30px,5vw,60px);
}

.weatherTemp{
font-size:clamp(24px,4vw,54px);
}

.dateValue{
font-size:clamp(18px,3vw,40px);
}

.news{
font-size:clamp(12px,1.5vw,18px);
line-height:1.8;
}

.news div{
overflow:hidden;
white-space:nowrap;
text-overflow:ellipsis;
}

</style>

</head>

<body>

<div class="dashboard">

<div class="header">

<div class="logo">
PIXOR
</div>

<div class="controls">

<select id="lang">
<option value="tr">Türkçe</option>
<option value="en">English</option>
</select>

<select id="theme">
<option value="">Neon</option>
<option value="theme-oled">OLED</option>
<option value="theme-matte">Matte</option>
<option value="theme-light">Light</option>
</select>

<button id="fullscreenBtn">
⛶
</button>

</div>

</div>

<div class="grid">

<div class="panel">

<div class="title">
BTC
</div>

<div class="btcValue">
98,193.21
</div>

</div>

<div class="panel">

<div class="title">
NASDAQ
</div>

<div class="stock">
<div>TSLA 403.31</div>
<div>NVDA 133.23</div>
<div>AAPL 234.40</div>
</div>

</div>

<div class="panel center">

<div class="title" id="clockTitle">
Saat
</div>

<div class="clockValue" id="clock">
00:00:00
</div>

</div>
<div class="panel center">

<div class="title" id="weatherTitle">
Hava Durumu
</div>

<div class="weatherIcon">
☀️
</div>

<div class="weatherTemp" id="weatherTemp">
Yükleniyor...
</div>

</div>

<div class="panel center">

<div class="title" id="calendarTitle">
Takvim
</div>

<div class="dateValue" id="date">
24.06.2026
</div>

</div>

<div class="panel">

<div class="title">
NEWS
</div>

<div class="news">

<div>• Yapay zeka gelişmeleri</div>
<div>• Kripto piyasaları</div>
<div>• Teknoloji haberleri</div>
<div>• Küresel piyasa hareketleri</div>

</div>

</div>

</div>

</div>

<script>

const text={

tr:{
clock:"Saat",
weather:"Hava Durumu",
calendar:"Takvim"
},

en:{
clock:"Clock",
weather:"Weather",
calendar:"Calendar"
}

};

function updateClock(){

const now=new Date();

document.getElementById("clock").innerHTML=
now.toLocaleTimeString();

document.getElementById("date").innerHTML=
now.toLocaleDateString();

}

setInterval(updateClock,1000);
updateClock();

document
.getElementById("lang")
.addEventListener("change",(e)=>{

const t=text[e.target.value];

document.getElementById("clockTitle").innerHTML=t.clock;
document.getElementById("weatherTitle").innerHTML=t.weather;
document.getElementById("calendarTitle").innerHTML=t.calendar;

});

document
.getElementById("theme")
.addEventListener("change",(e)=>{

document.body.className=e.target.value;

localStorage.setItem(
"pixorTheme",
e.target.value
);

});

const savedTheme=
localStorage.getItem("pixorTheme");

if(savedTheme){

document.body.className=savedTheme;
document.getElementById("theme").value=savedTheme;

}

document
.getElementById("fullscreenBtn")
.addEventListener("click",()=>{

if(document.documentElement.requestFullscreen){

document.documentElement.requestFullscreen();

}

});

</script>
<script src="js/settings.js"></script>
<script src="js/widgets.js"></script>
<script src="js/app.js"></script>
</body>
</html>
