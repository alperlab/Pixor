<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>PIXOR V2.1</title>
<link rel="stylesheet" href="css/themes.css">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="dashboard">

<div class="header">

<div class="logo">
PIXOR
</div>

<div class="controls">

<select id="lang">
<option value="tr">Türkçe</option>
<option value="en">English</option>
</select>

<select id="theme">
<option value="">Neon</option>
<option value="theme-oled">OLED</option>
<option value="theme-matte">Matte</option>
<option value="theme-light">Light</option>
</select>

<button id="fullscreenBtn">
⛶
</button>

</div>

</div>

<div class="grid">

<div class="panel">

<div class="title">
BTC
</div>

<div class="btcValue" id="btcPrice">
Yükleniyor...
</div>

</div>

<div class="panel">

<div class="title">
NASDAQ
</div>

<div class="stock">
<div>TSLA 403.31</div>
<div>NVDA 133.23</div>
<div>AAPL 234.40</div>
</div>

</div>

<div class="panel center">

<div class="title" id="clockTitle">
Saat
</div>

<div class="clockValue" id="clock">
00:00:00
</div>

</div>
<div class="panel center">

<div class="title" id="weatherTitle">
Hava Durumu
</div>

<div class="weatherIcon">
☀️
</div>

<div class="weatherTemp" id="weatherTemp">
Yükleniyor...
</div>

</div>

<div class="panel center">

<div class="title" id="calendarTitle">
Takvim
</div>

<div class="dateValue" id="date">
24.06.2026
</div>

</div>

<div class="panel">

<div class="title">
NEWS
</div>

<div class="news">

<div>• Yapay zeka gelişmeleri</div>
<div>• Kripto piyasaları</div>
<div>• Teknoloji haberleri</div>
<div>• Küresel piyasa hareketleri</div>

</div>

</div>

</div>

</div>

<script>

const text={

tr:{
clock:"Saat",
weather:"Hava Durumu",
calendar:"Takvim"
},

en:{
clock:"Clock",
weather:"Weather",
calendar:"Calendar"
}

};

function updateClock(){

const now=new Date();

document.getElementById("clock").innerHTML=
now.toLocaleTimeString();

document.getElementById("date").innerHTML=
now.toLocaleDateString();

}

setInterval(updateClock,1000);
updateClock();

document
.getElementById("lang")
.addEventListener("change",(e)=>{

const t=text[e.target.value];

document.getElementById("clockTitle").innerHTML=t.clock;
document.getElementById("weatherTitle").innerHTML=t.weather;
document.getElementById("calendarTitle").innerHTML=t.calendar;

});

document
.getElementById("theme")
.addEventListener("change",(e)=>{

document.body.className=e.target.value;

localStorage.setItem(
"pixorTheme",
e.target.value
);

});

const savedTheme=
localStorage.getItem("pixorTheme");

if(savedTheme){

document.body.className=savedTheme;
document.getElementById("theme").value=savedTheme;

}

document
.getElementById("fullscreenBtn")
.addEventListener("click",()=>{

if(document.documentElement.requestFullscreen){

document.documentElement.requestFullscreen();

}

});

</script>

<script src="services/crypto.js"></script>
<script src="services/weather.js"></script>
<script src="services/stocks.js"></script>
<script src="services/news.js"></script>
<script src="services/music.js"></script>

<script src="js/settings.js"></script>
<script src="js/widgets.js"></script>
<script src="js/app.js"></script>

</body>
</html>

<script src="services/crypto.js"></script>
<script src="services/weather.js"></script>
<script src="services/stocks.js"></script>
<script src="services/news.js"></script>
<script src="services/music.js"></script>

<script src="js/settings.js"></script>
<script src="js/widgets.js"></script>
<script src="js/app.js"></script>
</body>
</html>
